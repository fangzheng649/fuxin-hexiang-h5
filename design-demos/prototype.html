/* ============================
   iOS Frame 组件
   ============================ */
const iosFrameStyles = {
  wrapper: {
    display: 'inline-block',
    padding: 10,
    background: '#000',
    borderRadius: 54,
    boxShadow: '0 0 0 2px #2a2a2a, 0 20px 60px rgba(0,0,0,0.3)',
    position: 'relative',
  },
  screen: {
    position: 'relative',
    borderRadius: 44,
    overflow: 'hidden',
    background: '#fff',
  },
  statusBar: {
    position: 'absolute', top: 0, left: 0, right: 0,
    height: 54, display: 'flex', alignItems: 'center',
    justifyContent: 'space-between', padding: '0 32px',
    fontSize: 15, fontWeight: 600, zIndex: 20, pointerEvents: 'none',
  },
  dynamicIsland: {
    position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
    width: 124, height: 36, background: '#000', borderRadius: 999, zIndex: 30,
  },
  content: {
    position: 'absolute', top: 54, left: 0, right: 0, bottom: 34,
    overflow: 'auto', overflowX: 'hidden',
    WebkitOverflowScrolling: 'touch',
  },
  homeIndicator: {
    position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)',
    width: 134, height: 5, background: 'rgba(0,0,0,0.25)', borderRadius: 999, zIndex: 10,
  },
};

function IosFrame({ children, width = 375, height = 780, time = '9:41', battery = 85, darkMode = false }) {
  const textColor = darkMode ? '#fff' : '#000';
  return (
    <div style={iosFrameStyles.wrapper}>
      <div style={{ ...iosFrameStyles.screen, width, height, background: darkMode ? '#1a1a1a' : '#F5F0EB' }}>
        <div style={{ ...iosFrameStyles.statusBar, color: textColor }}>
          <span>{time}</span>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill={textColor}/><path d="M3 7.5a7 7 0 0110 0" stroke={textColor} strokeWidth="1.3" fill="none" strokeLinecap="round"/><path d="M1 4.5a11 11 0 0114 0" stroke={textColor} strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7"/></svg>
            <div style={{ width:24, height:11, border:`1.5px solid ${textColor}`, borderRadius:3, padding:1, opacity:0.8 }}>
              <div style={{ width:`${battery}%`, height:'100%', background:textColor, borderRadius:1, opacity:0.9 }}/>
            </div>
          </div>
        </div>
        <div style={iosFrameStyles.dynamicIsland} />
        <div style={iosFrameStyles.content}>{children}</div>
        <div style={iosFrameStyles.homeIndicator} />
      </div>
    </div>
  );
}

/* ============================
   共享 TabBar 组件
   ============================ */
function TabBar({ active = 0, onTab }) {
  const tabs = [
    { icon:'🏠', label:'首页' },
    { icon:'💬', label:'AI调香师' },
    { icon:'📦', label:'香方集' },
    { icon:'👤', label:'我的' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, height:56,
      background:'#FFFDF9', borderTop:`1px solid ${C.border}`,
      display:'flex', alignItems:'center', justifyContent:'space-around',
      zIndex:50, paddingBottom:4,
    }}>
      {tabs.map((t, i) => (
        <div key={i} onClick={() => onTab && onTab(i)}
          style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, cursor:'pointer',
            opacity: active === i ? 1 : 0.5,
            transform: active === i ? 'scale(1.05)' : 'scale(1)',
            transition: 'all 0.2s',
        }}>
          <span style={{ fontSize:20 }}>{t.icon}</span>
          <span style={{ fontSize:10, color: active === i ? C.primary : C.textLight, fontWeight: active === i ? 600 : 400 }}>{t.label}</span>
        </div>
      ))}
    </div>
  );
}
