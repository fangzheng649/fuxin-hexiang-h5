<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抚心合香 · 原型设计 v4</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');
:root {
  --tp:#4E2E1E; --td:#3A1F10; --tl:#B89555;
  --hg:#4A7C59; --hl:#B9DEC9;
  --rp:#F2E8D5; --pc:#F7EED9; --mg:#D4C5B0;
  --it:#1A1008; --t1:#1A1008; --t2:#5A4C3E; --t3:#8B7E6E;
  --w:#4A7C59; --f:#C75450; --e:#C9A050; --m:#B5AA90; --wt:#4A6B8A;
  --hr:#7A2E2E;
  --sc:0 2px 12px rgba(26,16,8,0.10);
  --sh:0 4px 20px rgba(26,16,8,0.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1A150E;font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;min-height:100vh;padding:40px 20px}
.page-title{text-align:center;color:#B89555;font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:6px}
.page-subtitle{text-align:center;color:rgba(184,149,85,0.6);font-size:13px;margin-bottom:40px;letter-spacing:2px}
.phones-grid{display:flex;flex-wrap:wrap;gap:48px;justify-content:center;align-items:flex-start;max-width:2600px;margin:0 auto}
.phone-col{display:flex;flex-direction:column;align-items:center}
.phone-label{font-size:13px;color:rgba(184,149,85,0.7);font-family:'Noto Serif SC',serif;margin-bottom:12px;letter-spacing:2px;font-style:italic}
/* Phone Frame */
.phone-frame{position:relative;width:390px;height:844px;background:var(--rp);border-radius:48px;overflow:hidden;box-shadow:0 0 0 2px rgba(255,255,255,0.06),0 30px 80px rgba(0,0,0,0.45)}
.status-bar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:14px;font-weight:600;color:var(--t1);position:relative;z-index:100}
.status-bar .island{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#1a1a1a;border-radius:0 0 20px 20px}
.status-icons{display:flex;gap:6px;align-items:center}
.status-icons svg{width:14px;height:14px}
.page-content{height:calc(844px - 54px - 80px);overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;background:var(--rp)}
.page-content::-webkit-scrollbar{display:none}
/* Tab Bar */
.tab-bar{height:80px;background:rgba(242,232,213,0.96);backdrop-filter:blur(20px);display:flex;align-items:flex-start;padding-top:8px;border-top:1px solid var(--mg);position:relative;z-index:200}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all 0.25s;padding:4px 0}
.tab-item .tab-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.tab-item .tab-icon svg{width:22px;height:22px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all 0.25s ease}
.tab-item .tab-label{font-size:11px;color:var(--t3);font-family:'Noto Serif SC',serif;font-weight:500;transition:all 0.25s ease}
.tab-item.active .tab-icon svg{stroke:var(--hr);stroke-width:1.8;transform:scale(1.05)}
.tab-item.active .tab-label{color:var(--hr);font-weight:700}
/* Hero */
.hero{position:relative;padding:24px 28px 28px;min-height:220px;background:linear-gradient(160deg,#E8DCC8,#D9CCAE 50%,#C8B898);overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(184,149,85,0.2),transparent 70%);border-radius:50%;animation:heroGlow 8s ease-in-out infinite}
.hero::after{content:'';position:absolute;bottom:-30px;left:20px;width:150px;height:150px;background:radial-gradient(circle,rgba(74,124,89,0.12),transparent 70%);border-radius:50%;animation:heroGlow 10s ease-in-out infinite reverse}
@keyframes heroGlow{0%,100%{transform:translate(0,0) scale(1);opacity:0.15}50%{transform:translate(-5px,-20px) scale(1.1);opacity:0.1}}
.hero-brand{font-family:'Noto Serif SC',serif;font-size:32px;font-weight:700;color:var(--t1);letter-spacing:12px;margin-bottom:10px;position:relative;z-index:1;text-indent:12px}
.hero-slogan{font-family:'Noto Serif SC',serif;font-size:14px;color:var(--t2);letter-spacing:4px;margin-bottom:18px;position:relative;z-index:1}
.hero-quote{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--t1);line-height:1.9;position:relative;z-index:1;margin-bottom:8px;letter-spacing:1px}
.hero-author{font-size:12px;color:var(--t3);position:relative;z-index:1;text-align:right}
.hero-cloud{position:absolute;bottom:0;left:0;right:0;height:20px;background:radial-gradient(ellipse at 20% 100%,rgba(184,149,85,0.2),transparent 50%),radial-gradient(ellipse at 50% 100%,rgba(184,149,85,0.12),transparent 40%),radial-gradient(ellipse at 80% 100%,rgba(184,149,85,0.2),transparent 50%)}
/* Quick Entries */
.quick-entries{display:flex;gap:12px;padding:20px 20px 0}
.quick-entry{flex:1;background:linear-gradient(135deg,var(--pc),#F5EDE0);padding:18px 10px;text-align:center;cursor:pointer;transition:all 0.25s;box-shadow:var(--sc);border-radius:12px;border:1px solid rgba(180,149,85,0.25);position:relative}
.quick-entry::before{content:'';position:absolute;inset:3px;border:1px solid rgba(180,149,85,0.12);border-radius:9px;pointer-events:none}
.quick-entry:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.quick-entry .qe-icon{width:36px;height:36px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.quick-entry .qe-icon svg{width:26px;height:26px}
.quick-entry .qe-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.quick-entry .qe-desc{font-size:10px;color:var(--t3)}
/* Section Header */
.section-header{display:flex;justify-content:space-between;align-items:center;padding:24px 20px 12px}
.section-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:6px}
.section-title::before{content:'';width:3px;height:14px;background:var(--tl);border-radius:2px}
.section-more{font-size:12px;color:var(--t3);cursor:pointer}
/* Cloud Divider */
.cloud-divider{display:flex;align-items:center;gap:12px;padding:16px 20px 4px;color:var(--tl);font-size:12px;opacity:0.5}
.cloud-divider::before,.cloud-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--tl),transparent)}
/* Double-border Card */
.card{margin:0 20px;overflow:hidden;box-shadow:var(--sc);cursor:pointer;transition:all 0.25s;border-radius:12px;border:1px solid rgba(180,149,85,0.25);background:var(--pc);position:relative}
.card::before{content:'';position:absolute;inset:3px;border:1px solid rgba(180,149,85,0.12);border-radius:9px;pointer-events:none;z-index:2}
.card:hover{box-shadow:var(--sh)}
/* Daily Herb Card */
.daily-herb-image{height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.daily-herb-name{font-family:'Noto Serif SC',serif;font-size:42px;font-weight:700;color:rgba(255,255,255,0.9);text-shadow:0 2px 12px rgba(0,0,0,0.1);z-index:1}
.daily-herb-tag{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.85);padding:4px 10px;border-radius:20px;font-size:10px;color:var(--hg);font-weight:500;backdrop-filter:blur(8px)}
.daily-herb-body{padding:16px}
.daily-herb-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--t1);margin-bottom:4px}
.daily-herb-wuxing{font-size:12px;color:var(--e);margin-bottom:8px}
.daily-herb-desc{font-size:12px;color:var(--t2);line-height:1.7}
/* Season Card */
.season-image{height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.season-name{font-family:'Noto Serif SC',serif;font-size:42px;font-weight:700;color:rgba(255,255,255,0.9);text-shadow:0 2px 12px rgba(0,0,0,0.1);z-index:1}
.season-tag{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.85);padding:4px 10px;border-radius:20px;font-size:10px;color:var(--hg);font-weight:500;backdrop-filter:blur(8px)}
.season-body{padding:16px}
.season-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--t1);margin-bottom:4px}
.season-effect{font-size:12px;color:var(--hg);margin-bottom:8px}
.season-desc{font-size:12px;color:var(--t2);line-height:1.7}
/* Notes Scroll */
.notes-scroll{display:flex;gap:12px;padding:0 20px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.notes-scroll::-webkit-scrollbar{display:none}
.note-card{min-width:200px;overflow:hidden;box-shadow:var(--sc);scroll-snap-align:start;cursor:pointer;transition:all 0.25s;background:var(--pc);border-radius:12px;border:1px solid rgba(180,149,85,0.2)}
.note-card:hover{transform:translateY(-2px)}
.note-card-image{height:100px;position:relative;display:flex;align-items:center;justify-content:center}
.note-card-body{padding:12px}
.note-card-title{font-size:13px;font-weight:500;color:var(--t1);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-card-date{font-size:10px;color:var(--t3);margin-top:4px}
/* Workshop Banner */
.workshop-banner{margin:0 20px;background:linear-gradient(135deg,#1A0E05,var(--td));border-radius:16px;padding:20px;color:var(--tl);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.workshop-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(201,160,80,0.15),transparent 70%);border-radius:50%}
.workshop-banner:hover{transform:translateY(-1px)}
.workshop-info h4{font-family:'Noto Serif SC',serif;font-size:15px;margin-bottom:4px;color:#D4C5B0}
.workshop-info p{font-size:11px;opacity:0.7}
.workshop-btn{background:rgba(201,160,80,0.2);border:1px solid rgba(201,160,80,0.4);padding:8px 16px;border-radius:20px;color:#C9A050;font-size:12px;cursor:pointer;white-space:nowrap}
/* Chat Page */
.chat-wrap{display:flex;flex-direction:column;height:100%;background:var(--rp)}
.chat-header{padding:12px 20px;background:var(--rp);text-align:center;border-bottom:0.5px solid var(--mg);position:relative}
.chat-header h3{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--t1)}
.chat-header p{font-size:11px;color:var(--t3)}
.chat-reset{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:28px;height:28px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-reset svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:1.5}
.chat-messages{flex:1;padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.chat-messages::-webkit-scrollbar{display:none}
.chat-msg{max-width:80%;animation:fadeIn 0.4s ease}
.chat-msg.ai{align-self:flex-start}
.chat-msg.user{align-self:flex-end}
.chat-bubble{padding:12px 16px;border-radius:18px;font-size:13px;line-height:1.6}
.chat-msg.ai .chat-bubble{background:var(--pc);color:var(--t1);border-bottom-left-radius:4px;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.2)}
.chat-msg.user .chat-bubble{background:var(--tp);color:#F7EED9;border-bottom-right-radius:4px}
.chat-avatar-row{font-size:11px;color:var(--t3);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.chat-avatar-row.user-row{justify-content:flex-end}
.chat-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--hl),var(--hg));display:flex;align-items:center;justify-content:center}
.chat-avatar svg{width:12px;height:12px;stroke:white;fill:none;stroke-width:2}
/* Emotion buttons in chat */
.emotion-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.emotion-pill{background:var(--rp);border:1.5px solid var(--mg);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.emotion-pill:hover{border-color:var(--tp);background:rgba(78,46,30,0.05)}
.emotion-pill.selected{border-color:var(--tp);background:rgba(78,46,30,0.1);color:var(--tp)}
/* Typing indicator */
.typing-indicator{display:flex;gap:4px;padding:12px 16px;background:var(--pc);border-radius:18px;border-bottom-left-radius:4px;box-shadow:var(--sc);width:fit-content;border:1px solid rgba(180,149,85,0.2)}
.typing-dot{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:typeBounce 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typeBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* Chat input */
.chat-input-area{padding:12px 20px 20px;background:var(--rp);border-top:0.5px solid var(--mg);display:flex;gap:10px;align-items:center}
.chat-input{flex:1;background:var(--pc);border:1px solid var(--mg);border-radius:22px;padding:10px 16px;font-size:13px;outline:none;color:var(--t1);font-family:inherit}
.chat-input::placeholder{color:var(--t3)}
.chat-input:focus{border-color:var(--tl)}
.chat-send{width:38px;height:38px;background:var(--tp);border-radius:50%;border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.chat-send:hover{background:var(--td)}
.chat-send svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2}
/* Five Elements analysis */
.five-elements-card{margin:8px 0;padding:16px;background:var(--pc);border-radius:16px;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.2)}
.five-elements-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--t1);margin-bottom:12px;text-align:center}
.five-elements-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.five-element-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.fe-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:white}
.fe-label{font-size:10px;color:var(--t2)}
.fe-bar{width:44px;height:4px;background:var(--mg);border-radius:2px;overflow:hidden}
.fe-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.fe-result{text-align:center;font-size:12px;color:var(--t2);margin-top:4px}
/* Recipe result in chat */
.recipe-result{margin:8px 0;background:var(--pc);border-radius:16px;overflow:hidden;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.2)}
.recipe-result-image{height:100px;display:flex;align-items:center;justify-content:center}
.recipe-result-image span{font-family:'Noto Serif SC',serif;font-size:32px;color:rgba(255,255,255,0.9);text-shadow:0 2px 8px rgba(0,0,0,0.2)}
.recipe-result-body{padding:16px}
.recipe-result-name{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--t1);margin-bottom:4px}
.recipe-result-effect{font-size:12px;color:var(--hg);margin-bottom:10px}
.herb-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.herb-tag{padding:3px 10px;border-radius:12px;font-size:10px;border:1px solid}
/* Shop Page */
.shop-search{margin:12px 20px 0;position:relative}
.shop-search input{width:100%;padding:10px 16px 10px 36px;border:1px solid var(--mg);border-radius:24px;background:var(--pc);font-size:13px;color:var(--t1);outline:none;font-family:inherit}
.shop-search input::placeholder{color:var(--t3)}
.shop-search input:focus{border-color:var(--tl)}
.shop-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2}
.shop-tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--mg);margin-top:12px}
.shop-tab{padding:12px 0;margin-right:24px;font-size:13px;color:var(--t3);cursor:pointer;position:relative;font-family:'Noto Serif SC',serif;transition:all .2s}
.shop-tab.active{color:var(--tp);font-weight:600}
.shop-tab.active::after{content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--tp),transparent)}
.shop-grid{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.shop-card{background:var(--pc);border-radius:12px;overflow:hidden;box-shadow:var(--sc);display:flex;cursor:pointer;transition:all .25s;border:1px solid rgba(180,149,85,0.2);position:relative}
.shop-card::before{content:'';position:absolute;inset:3px;border:1px solid rgba(180,149,85,0.12);border-radius:9px;pointer-events:none;z-index:0}
.shop-card:hover{box-shadow:var(--sh);transform:translateY(-1px)}
.shop-card-image{width:120px;min-height:130px;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.shop-card-image .vertical-name{font-family:'Noto Serif SC',serif;font-size:18px;color:rgba(255,255,255,0.7);z-index:1;writing-mode:vertical-rl}
.shop-card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.shop-card-name{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;color:var(--t1);margin-bottom:2px}
.shop-card-effect{font-size:11px;color:var(--hg);margin-bottom:6px}
.shop-card-desc{font-size:11px;color:var(--t2);line-height:1.5;flex:1}
.shop-card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.shop-card-price{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--tp)}
.shop-card-price::before{content:'\00a5';font-size:12px}
.shop-card-btn{padding:6px 14px;background:var(--tp);color:white;border:none;border-radius:16px;font-size:11px;font-family:'Noto Serif SC',serif;cursor:pointer}
.shop-card-btn:hover{background:var(--td)}
.shop-custom{margin:0 20px;padding:20px;background:linear-gradient(135deg,var(--it),var(--td));border-radius:16px;color:var(--tl);position:relative;overflow:hidden;cursor:pointer}
.shop-custom::before{content:'';position:absolute;top:-30px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(201,160,80,0.12),transparent 70%);border-radius:50%}
.shop-custom-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;color:#C9A050;margin-bottom:4px}
.shop-custom-desc{font-size:12px;color:rgba(232,221,211,0.7);margin-bottom:10px}
.shop-custom-btn{display:inline-block;padding:8px 20px;background:rgba(201,160,80,0.2);border:1px solid rgba(201,160,80,0.4);border-radius:20px;color:#C9A050;font-size:12px;cursor:pointer}
.shop-subscribe{margin:8px 20px;padding:16px;background:linear-gradient(135deg,rgba(78,46,30,0.06),rgba(74,124,89,0.06));border-radius:14px;border:1px dashed var(--tl)}
.shop-subscribe-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px}
.shop-subscribe-desc{font-size:11px;color:var(--t2);line-height:1.5}
.shop-subscribe-tag{display:inline-block;font-size:10px;color:var(--f);background:rgba(199,84,80,0.08);padding:2px 8px;border-radius:8px;margin-left:6px}
.gift-scroll{display:flex;gap:12px;padding:0 20px;overflow-x:auto}
.gift-scroll::-webkit-scrollbar{display:none}
.gift-card{min-width:220px;background:var(--pc);border-radius:14px;overflow:hidden;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.2);cursor:pointer;flex-shrink:0;transition:all .25s}
.gift-card:hover{transform:translateY(-2px)}
.gift-card-image{height:90px;display:flex;align-items:center;justify-content:center}
.gift-card-image span{font-family:'Noto Serif SC',serif;font-size:16px;color:rgba(255,255,255,0.9)}
.gift-card-body{padding:12px}
.gift-card-name{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px}
.gift-card-info{font-size:10px;color:var(--t3);margin-bottom:6px;line-height:1.4}
.gift-card-price{font-size:14px;font-weight:700;color:var(--tp)}
.gift-card-price::before{content:'\00a5';font-size:10px}
/* Heritage Page */
.heritage-hero{position:relative;height:180px;background:linear-gradient(135deg,#1A0E05,var(--td) 40%,#3A6449 100%);display:flex;align-items:flex-end;padding:20px;overflow:hidden}

.heritage-content h2{font-family:'Noto Serif SC',serif;font-size:20px;margin-bottom:4px}
.heritage-content p{font-size:12px;opacity:0.85}
.heritage-badge{position:absolute;top:50px;right:16px;width:60px;height:60px;border:2px solid rgba(201,160,80,0.6);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:#C9A050;line-height:1.3;text-align:center;background:rgba(44,31,18,0.5);backdrop-filter:blur(4px)}

.knowledge-cards{padding:0 20px;display:flex;flex-direction:column;gap:12px}
.knowledge-card{display:flex;gap:14px;padding:14px;background:var(--pc);border-radius:12px;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.2);cursor:pointer;transition:all .25s;position:relative}

.knowledge-card:hover{transform:translateY(-1px)}

.knowledge-card-body{flex:1}
.knowledge-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px}
.knowledge-text{font-size:11px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.video-scroll{display:flex;gap:12px;padding:0 20px;overflow-x:auto}
.video-scroll::-webkit-scrollbar{display:none}
.video-card{min-width:170px;border-radius:14px;overflow:hidden;background:var(--pc);box-shadow:var(--sc);cursor:pointer;transition:all .25s;border:1px solid rgba(180,149,85,0.15);flex-shrink:0}

.video-thumb{height:100px;position:relative;display:flex;align-items:center;justify-content:center}
.video-play{width:40px;height:40px;background:rgba(255,255,255,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tp)}
.video-duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.5);color:white;padding:2px 8px;border-radius:4px;font-size:10px}
.video-info{padding:10px 12px}
.video-title{font-size:13px;font-weight:500;color:var(--t1)}
.video-views{font-size:10px;color:var(--t3);margin-top:2px}
.game-card{margin:0 20px;background:linear-gradient(135deg,var(--hg),#3A6449);border-radius:16px;padding:24px 20px;color:white;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.game-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(255,255,255,0.1),transparent);border-radius:50%}
.game-card:hover{transform:translateY(-2px)}
.game-card h4{font-family:'Noto Serif SC',serif;font-size:18px;margin-bottom:8px}
.game-card p{font-size:12px;opacity:0.85;line-height:1.6;margin-bottom:16px}
.game-btn{display:inline-block;padding:10px 28px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:24px;color:white;font-size:13px;font-family:'Noto Serif SC',serif;cursor:pointer}
.workshop-card{margin:0 20px;background:var(--pc);border-radius:16px;overflow:hidden;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.2);position:relative}
.workshop-card::before{content:'';position:absolute;inset:3px;border:1px solid rgba(180,149,85,0.1);border-radius:13px;pointer-events:none}
.workshop-header{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--mg)}
.workshop-header svg{width:18px;height:18px;stroke:var(--tp);fill:none;stroke-width:1.5;flex-shrink:0}
.workshop-location{font-size:13px;color:var(--t1);font-weight:500;font-family:'Noto Serif SC',serif}
.workshop-sub{font-size:11px;color:var(--t3)}
.workshop-slots{padding:12px 16px}
.workshop-slot{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(232,221,211,0.5)}
.workshop-slot:last-child{border-bottom:none}
.workslot-date{font-size:13px;color:var(--t1)}
.workslot-remain{font-size:11px;color:var(--hg)}
.workslot-btn{padding:5px 14px;background:var(--tp);color:white;border:none;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit}
.workslot-btn:hover{background:var(--td)}
/* Community in Heritage */
.community-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px}
.community-tabs{display:flex;gap:16px;padding:8px 20px}
.community-tab{font-size:12px;color:var(--t3);cursor:pointer;padding-bottom:4px}
.community-tab.active{color:var(--tp);font-weight:600;border-bottom:2px solid var(--tp)}
.community-publish{padding:5px 14px;background:var(--tp);color:white;border:none;border-radius:14px;font-size:11px;cursor:pointer;font-family:'Noto Serif SC',serif}
.community-list{padding:0 20px;display:flex;flex-direction:column;gap:10px}
.community-post{background:var(--pc);border-radius:14px;padding:14px;box-shadow:var(--sc);border:1px solid rgba(180,149,85,0.15);cursor:pointer;transition:all .25s}
.community-post:hover{transform:translateY(-1px)}
.community-user{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.community-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(44,31,18,0.12)}
.community-username{font-size:12px;font-weight:500;color:var(--t1)}
.community-time{font-size:10px;color:var(--t3);margin-left:auto}
.community-text{font-size:12px;color:var(--t2);line-height:1.6}
.community-recipe-tag{display:inline-block;font-size:10px;color:var(--tp);background:rgba(78,46,30,0.08);padding:2px 8px;border-radius:8px;margin-top:6px}
.community-image{height:80px;border-radius:8px;margin-top:8px}
.community-actions{display:flex;gap:20px;margin-top:10px;font-size:11px;color:var(--t3)}

.community-action:hover{color:var(--tp)}
.community-action.liked{color:var(--f)}

// ==================== AI CHAT PAGE ====================
function ChatPage({ onTabChange, showToast }) {
  const [messages, setMessages] = React.useState([]);
  const [step, setStep] = React.useState(0);
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const [initialized, setInitialized] = React.useState(false);
  const messagesEndRef = React.useRef(null);
  const containerRef = React.useRef(null);

  const scrollToBottom = () => {
    setTimeout(() => {
      if (containerRef.current) containerRef.current.scrollTop = containerRef.current.scrollHeight;
    }, 60);
  };

  const addAI = React.useCallback((text) => {
    setMessages(prev => [...prev, { type:'ai', text }]);
    scrollToBottom();
  }, []);

  const addUser = React.useCallback((text) => {
    setMessages(prev => [...prev, { type:'user', text }]);
    scrollToBottom();
  }, []);

  const addElement = React.useCallback((element) => {
    setMessages(prev => [...prev, { type:'element', ...element }]);
    scrollToBottom();
  }, []);

  const addRecipe = React.useCallback((recipe) => {
    setMessages(prev => [...prev, { type:'recipe', ...recipe }]);
    scrollToBottom();
  }, []);

  const addEmotions = React.useCallback(() => {
    setMessages(prev => [...prev, { type:'emotions' }]);
    scrollToBottom();
  }, []);

  // Initialize chat
  React.useEffect(() => {
    if (initialized) return;
    setInitialized(true);
    const timer1 = setTimeout(() => {
      addAI('你好，我是你的AI配香助手 🪷\n\n在开始之前，先深呼吸三次……\n\n呼——吸——呼——\n感受到了吗？那一丝丝的宁静。\n\n那我们开始吧。');
      const timer2 = setTimeout(() => {
        setTyping(true);
        scrollToBottom();
        const timer3 = setTimeout(() => {
          setTyping(false);
          addAI('你最近的心情怎么样？可以选下面的选项，也可以自己说 👇');
          addEmotions();
          setStep(2);
        }, 1500);
        return () => clearTimeout(timer3);
      }, 1500);
      return () => clearTimeout(timer2);
    }, 500);
    return () => clearTimeout(timer1);
  }, [initialized]);

  const handleEmotionSelect = (text, idx) => {
    // Disable all emotion pills
    setMessages(prev => prev.map(m => m.type === 'emotions' ? { ...m, selectedIdx: idx } : m));
    addUser(text);
    setStep(3);
    setTimeout(() => {
      setTyping(true);
      scrollToBottom();
      setTimeout(() => {
        setTyping(false);
        addAI('我理解你的感受。能再具体说说吗？\n\n比如——睡不着的时候，脑子里会不会想很多事情？还是身体有什么不舒服的地方？');
        setStep(3);
      }, 1500);
    }, 800);
  };

  const handleSend = () => {
    const text = input.trim();
    if (!text) return;
    addUser(text);
    setInput('');

    if (step === 3) {
      setStep(4);
      setTimeout(() => {
        setTyping(true);
        scrollToBottom();
        setTimeout(() => {
          setTyping(false);
          addAI('从你描述的情况看，这可能与肝气不舒有关。中医讲「肝主疏泄」，肝气郁结则情绪不畅、夜卧不安。\n\n让我帮你看看五行体质倾向——');
          setTimeout(() => {
            setTyping(true);
            scrollToBottom();
            setTimeout(() => {
              setTyping(false);
              addElement({
                elements: [
                  { label:'木', organ:'肝', pct:85, color:'var(--w)' },
                  { label:'火', organ:'心', pct:65, color:'var(--f)' },
                  { label:'土', organ:'脾', pct:50, color:'var(--e)' },
                  { label:'金', organ:'肺', pct:55, color:'var(--m)' },
                  { label:'水', organ:'肾', pct:35, color:'var(--wt)' },
                ],
                desc: '木旺（肝气偏盛）· 水弱（肾气不足）'
              });
              setStep(5);
              setTimeout(() => {
                setTyping(true);
                scrollToBottom();
                setTimeout(() => {
                  setTyping(false);
                  addAI('你的五行分析显示：木偏旺、水偏弱。\n\n木旺则肝气有余，易急躁失眠；水弱则肾气不足，难以藏精安神。\n\n我为你推荐一个香方 👇');
                  setTimeout(() => {
                    const herbCls = {'君':'#4E2E1E','臣':'#4A7C59','佐':'#4A6B8A','使':'#C9A050'};
                    addRecipe({
                      name:'竹影清风', effect:'清心降火 · 安神定志 · 交通心肾',
                      color:'linear-gradient(135deg,#8BAA86,#3A6345)',
                      herbs: [
                        {n:'檀香',r:'君',c:herbCls['君']},{n:'柏木',r:'臣',c:herbCls['臣']},
                        {n:'白芍',r:'佐',c:herbCls['佐']},{n:'远志',r:'使',c:herbCls['使']}
                      ],
                      desc:'君药檀香温中理气，臣药柏木宁心安神，佐以白芍柔肝缓急，使药远志交通心肾。四药合伍，疏肝解郁、清心安神。'
                    });
                    setStep(6);
                  }, 800);
                }, 1800);
              }, 1200);
            }, 1500);
          }, 1200);
        }, 1800);
      }, 800);
    } else if (step >= 5) {
      setTimeout(() => {
        setTyping(true);
        scrollToBottom();
        setTimeout(() => {
          setTyping(false);
          addAI('感谢你的分享。香方会在3-5天内送到，使用一周后，记得回来告诉我你的感受 🪷\n\n我们可以根据你的变化来调整方案。');
        }, 1500);
      }, 500);
    } else if (step < 3) {
      setTimeout(() => {
        setTyping(true);
        scrollToBottom();
        setTimeout(() => {
          setTyping(false);
          addAI('谢谢你的分享，请先选择一个最符合你当前状态的选项，这样我可以更精准地为你推荐香方。');
        }, 1200);
      }, 500);
    } else {
      setTimeout(() => {
        setTyping(true);
        scrollToBottom();
        setTimeout(() => {
          setTyping(false);
          addAI('我理解。请再多说一些，这样我能更好地为你分析体质。');
        }, 1200);
      }, 500);
    }
  };

  const handleReset = () => {
    setMessages([]);
    setStep(0);
    setInput('');
    setTyping(false);
    setInitialized(false);
  };

  const emotions = [
    { emoji:'😰', label:'焦虑', text:'最近压力很大' },
    { emoji:'😔', label:'低落', text:'情绪低落' },
    { emoji:'🥱', label:'疲惫', text:'总是睡不好' },
    { emoji:'😤', label:'烦躁', text:'容易烦躁' },
    { emoji:'😊', label:'还好', text:'还不错，想试试' },
  ];

  return (
    <div className="chat-wrap">
      {/* Header */}
      <div className="chat-header">
        <h3>🪷 AI 配香助手</h3>
        <p>以千年合香之方，调理今日之情志</p>
        <button className="chat-reset" onClick={handleReset} title="重新开始">
          <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
      </div>

      {/* Messages */}
      <div className="chat-messages" ref={containerRef}>
        {messages.map((msg, i) => {
          if (msg.type === 'ai') {
            return (
              <div key={i} className="chat-msg ai">
                <div className="chat-avatar-row">
                  <div className="chat-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" fill="none"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg>
                  </div>
                  AI配香助手
                </div>
                <div className="chat-bubble">{msg.text.split('\n').map((line, j) => <React.Fragment key={j}>{j > 0 && <br/>}{line}</React.Fragment>)}</div>
              </div>
            );
          }
          if (msg.type === 'user') {
            return (
              <div key={i} className="chat-msg user">
                <div className="chat-avatar-row user-row">我</div>
                <div className="chat-bubble">{msg.text}</div>
              </div>
            );
          }
          if (msg.type === 'emotions') {
            return (
              <div key={i} className="chat-msg ai" style={{maxWidth:'85%'}}>
                <div className="emotion-pills">
                  {emotions.map((e, ei) => (
                    <button key={ei} className={`emotion-pill ${msg.selectedIdx === ei ? 'selected' : ''}`}
                      disabled={msg.selectedIdx !== undefined && msg.selectedIdx !== ei}
                      style={msg.selectedIdx !== undefined && msg.selectedIdx !== ei ? {opacity:0.4} : {}}
                      onClick={() => handleEmotionSelect(e.text, ei)}>
                      {e.emoji} {e.label}
                    </button>
                  ))}
                </div>
              </div>
            );
          }
          if (msg.type === 'element') {
            return (
              <div key={i} className="chat-msg ai" style={{maxWidth:'90%'}}>
                <div className="five-elements-card">
                  <div className="five-elements-title">五行体质分析</div>
                  <div className="five-elements-row">
                    {msg.elements.map((el, ei) => (
                      <div key={ei} className="five-element-item">
                        <div className="fe-circle" style={{background:el.color}}>{el.label}</div>
                        <div className="fe-label">{el.organ}</div>
                        <div className="fe-bar"><div className="fe-bar-fill" style={{width:`${el.pct}%`,background:el.color}}></div></div>
                      </div>
                    ))}
                  </div>
                  <div className="fe-result">{msg.desc}</div>
                </div>
              </div>
            );
          }
          if (msg.type === 'recipe') {
            return (
              <div key={i} className="chat-msg ai" style={{maxWidth:'88%'}}>
                <div className="recipe-result">
                  <div className="recipe-result-image" style={{background:msg.color}}>
                    <span>{msg.name}</span>
                  </div>
                  <div className="recipe-result-body">
                    <div className="recipe-result-name">「{msg.name}」</div>
                    <div className="recipe-result-effect">{msg.effect}</div>
                    <div className="herb-tags">
                      {msg.herbs.map((h, hi) => (
                        <span key={hi} className="herb-tag" style={{borderColor:h.c, color:h.c, background:h.c+'0F'}}>{h.n} · {h.r}</span>
                      ))}
                    </div>
                    <p style={{fontSize:11,color:'var(--t2)',lineHeight:1.6,marginBottom:12}}>{msg.desc}</p>
                    <button style={{width:'100%',padding:12,background:'var(--tp)',color:'white',border:'none',borderRadius:12,fontSize:14,fontFamily:"'Noto Serif SC',serif",cursor:'pointer'}} onClick={() => onTabChange(2)}>立即请方 ¥158</button>
                    <button style={{width:'100%',padding:10,background:'transparent',color:'var(--t2)',border:'1px solid var(--mg)',borderRadius:12,fontSize:12,cursor:'pointer',marginTop:8,fontFamily:'inherit'}} onClick={() => showToast('已为您预约传承人连线')}>想与传承人聊聊 →</button>
                  </div>
                </div>
              </div>
            );
          }
          return null;
        })}
        {typing && (
          <div className="chat-msg ai">
            <div className="chat-avatar-row">
              <div className="chat-avatar">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" fill="none"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg>
              </div>
              AI配香助手
            </div>
            <div className="typing-indicator">
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
            </div>
          </div>
        )}
        <div ref={messagesEndRef}></div>
      </div>

      {/* Input */}
      <div className="chat-input-area">
        <input className="chat-input" value={input} onChange={e => setInput(e.target.value)}
          placeholder={step < 2 ? "说说你的感受..." : step === 2 ? "选择上方的选项开始..." : "描述你的具体感受..."}
          onKeyDown={e => { if(e.key === 'Enter'){e.preventDefault();handleSend();} }}
          disabled={step === 0 || typing} />
        <button className="chat-send" onClick={handleSend}>
          <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>
  );
}

function ProfilePage({ showToast }) {
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * 2;
    canvas.height = rect.height * 2;
    ctx.scale(2, 2);
    const w = rect.width, h = rect.height;
    const pad = { top: 10, right: 10, bottom: 24, left: 30 };
    const data = [3,3,2,4,3,2,3,4,5,5,6,6,5,7,6,7,7,8,7,8,8,9,8,9,8,9,9,9,9,10];
    const cw = w - pad.left - pad.right;
    const ch = h - pad.top - pad.bottom;

    // Grid
    ctx.strokeStyle = '#D4C5B0'; ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (ch/4) * i;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    }
    // X labels
    ctx.fillStyle = '#9B8E7E'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ['1','5','10','15','20','25','30'].forEach(l => {
      const x = pad.left + ((parseInt(l)-1)/29)*cw;
      ctx.fillText(l, x, h - 6);
    });
    // Y labels
    ctx.textAlign = 'right';
    ['😊','😐','😔'].forEach((l,i) => {
      ctx.fillText(l, pad.left - 4, pad.top + (ch/2)*i + 4);
    });

    // Line
    ctx.beginPath();
    ctx.strokeStyle = '#4E2E1E'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    data.forEach((v, i) => {
      const x = pad.left + (i/29)*cw;
      const y = pad.top + ch - ((v-1)/9)*ch;
      if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Fill
    const lastX = pad.left + cw;
    ctx.lineTo(lastX, pad.top + ch);
    ctx.lineTo(pad.left, pad.top + ch);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    grad.addColorStop(0, 'rgba(78,46,30,0.15)');
    grad.addColorStop(1, 'rgba(78,46,30,0.02)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Marker line
    const mkIdx = 7;
    const mkX = pad.left + (mkIdx/29)*cw;
    ctx.strokeStyle = '#4A7C59'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(mkX, pad.top); ctx.lineTo(mkX, pad.top + ch); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#4A7C59'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('开始用香', mkX, pad.top - 2);
  }, []);

  const achievements = [
    { name:'初识合香', progress:'已完成', bg:'linear-gradient(135deg,#C8B898,#A8864E)', icon: <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.8l-6.2 4.5 2.4-7.4L2 9.4h7.6z"/></svg> },

  ];

        {achievements.map((a,i) => (
          <div className="achievement-item" key={i}>
            <div className="achievement-circle" style={{background:a.bg, opacity:a.locked?0.5:1}}>{a.icon}</div>
            <div className="achievement-name">{a.name}</div>
            <div className="achievement-progress">{a.progress}</div>
          </div>
        ))}
      </div>

      {/* Menu */}
      <div className="section-header"><span className="section-title">更多功能</span></div>
      <div className="menu-section">
        {menuItems.map((group,gi) => (
          <div className="menu-group" key={gi}>
            {group.group.map((item,ii) => (
              <div className="menu-item" key={ii} onClick={() => showToast(item.label+'加载中...')}>
                <div className="menu-left"><span className="menu-icon">{item.icon}</span><span className="menu-label">{item.label}</span>{item.badge && <span className="menu-badge">{item.badge}</span>}</div>
                <span className="menu-arrow">›</span>
              </div>
            ))}
          </div>
        ))}
      </div>

      <div style={{height:20}}></div>
    </div>
  );
}

// ==================== PHONE APP ====================
function PhoneApp({ initialTab = 0 }) {
  const [activeTab, setActiveTab] = React.useState(initialTab);
  const [toast, setToast] = React.useState(null);
  const [productModal, setProductModal] = React.useState(null);

  const showToast = (text) => {
    setToast(text);
    setTimeout(() => setToast(null), 2000);
  };

  const handleProductClick = (idx) => setProductModal(idx);

  const renderPage = () => {
    switch(activeTab) {
      case 0: return <HomePage onTabChange={setActiveTab} onProductClick={handleProductClick} />;
      case 1: return <ChatPage onTabChange={setActiveTab} showToast={showToast} />;
      case 2: return <ShopPage onTabChange={setActiveTab} onProductClick={handleProductClick} showToast={showToast} />;
      case 3: return <HeritagePage onTabChange={setActiveTab} showToast={showToast} />;
      case 4: return <ProfilePage showToast={showToast} />;
      default: return null;
    }
  };

  return (
    <div className="phone-frame">
      <StatusBar />
      <div className="page-content" key={activeTab} style={{animation:'fadeIn 0.3s ease', ...(activeTab === 1 ? {overflow:'hidden'} : {})}}>
        {renderPage()}
      </div>
      <TabBar active={activeTab} onTabChange={setActiveTab} />

      {/* Product Detail Modal */}
      {productModal !== null && (
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.45)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center',animation:'fadeIn 0.2s ease'}} onClick={() => setProductModal(null)}>
          <div style={{background:'var(--rp)',width:'100%',borderRadius:'20px 20px 0 0',padding:'20px',maxHeight:'75%',overflowY:'auto',animation:'slideUp 0.3s ease'}} onClick={e => e.stopPropagation()}>
            <div style={{width:40,height:4,background:'var(--mg)',borderRadius:2,margin:'0 auto 16px'}}></div>
            {(() => {
              const p = products[productModal];
              const herbCls = {'君':'#4E2E1E','臣':'#4A7C59','佐':'#4A6B8A','使':'#C9A050'};
              return (
                <React.Fragment>
                  <div style={{width:'100%',height:120,background:p.color,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
                    <span style={{fontFamily:"'Noto Serif SC',serif",fontSize:32,color:'rgba(255,255,255,0.9)'}}>{p.name}</span>
                  </div>
                  <h3 style={{fontFamily:"'Noto Serif SC',serif",fontSize:20,color:'var(--t1)',marginBottom:4}}>「{p.name}」香牌</h3>
                  <p style={{fontSize:12,color:'var(--hg)',marginBottom:8}}>{p.effect}</p>
                  <p style={{fontSize:12,color:'var(--t2)',lineHeight:1.7,marginBottom:12}}>{p.principle}</p>
                  <div style={{marginBottom:12}}>
                    <p style={{fontSize:12,color:'var(--t3)',marginBottom:8}}>药材组成</p>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {p.herbs.map((h, i) => (
                        <span key={i} style={{padding:'3px 10px',borderRadius:12,fontSize:10,border:`1px solid ${herbCls[h.r]}`,color:herbCls[h.r],background:herbCls[h.r]+'0F'}}>{h.n} · {h.r}</span>
                      ))}
                    </div>
                  </div>
                  <div style={{marginBottom:16}}>
                    <p style={{fontSize:12,color:'var(--t3)',marginBottom:6}}>使用方法</p>
                    <p style={{fontSize:12,color:'var(--t2)',lineHeight:1.6}}>{p.usage}</p>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16,marginBottom:8}}>
                    <div>
                      <span style={{fontFamily:"'Noto Serif SC',serif",fontSize:24,fontWeight:700,color:'var(--tp)'}}>¥{p.price}</span>
                      <span style={{fontSize:12,color:'var(--t3)',textDecoration:'line-through',marginLeft:8}}>¥{p.origPrice}</span>
                    </div>
                    <span style={{fontSize:11,color:'var(--f)',background:'rgba(199,84,80,0.08)',padding:'4px 10px',borderRadius:10}}>首次请方8折</span>
                  </div>
                  <button style={{width:'100%',padding:12,background:'var(--tp)',color:'white',border:'none',borderRadius:12,fontSize:14,fontFamily:"'Noto Serif SC',serif",cursor:'pointer',marginBottom:8}} onClick={() => { setProductModal(null); setActiveTab(1); }}>🤖 让AI为我开方</button>
                  <button style={{width:'100%',padding:10,background:'transparent',color:'var(--t2)',border:'1px solid var(--mg)',borderRadius:12,fontSize:12,cursor:'pointer',fontFamily:'inherit'}} onClick={() => { setProductModal(null); showToast('已加入订单'); }}>立即请方 ¥{p.price}</button>
                </React.Fragment>
              );
            })()}
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'rgba(26,16,8,0.92)',color:'white',padding:'12px 24px',borderRadius:12,fontSize:13,zIndex:500,whiteSpace:'nowrap',animation:'fadeIn 0.3s ease',pointerEvents:'none'}}>
          {toast}
        </div>
      )}
    </div>
  );
}

// ==================== APP ====================
function App() {
  const screens = [
    { id:0, label:'① 首页 · 静' },
    { id:1, label:'② AI调香师 · 问' },
    { id:2, label:'③ 香方集 · 方' },
    { id:3, label:'④ 非遗传承 · 承' },
    { id:4, label:'⑤ 我的香囊 · 安' },

  return (
    <React.Fragment>
      <div className="page-title">抚心合香 · 原型设计 v4</div>
      <div className="page-subtitle">以香入药 · 以心疗心</div>
      <div className="phones-grid">
        {screens.map(s => (

root.render(<App />);
